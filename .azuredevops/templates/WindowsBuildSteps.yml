parameters:
- name: target_arch
  type: string
  default: x64
- name: skip_test
  type: string
  default: False

steps:
- task: PowerShell@2
  inputs:
    targetType: 'inline'
    script: |
      mkdir build
      cd build
      if ('${{ parameters.skip_test }}' -eq 'True') {
        $run_test = 'OFF'
      } else {
        $run_test = 'ON'
      }
      cmake -DUNCRUSTIFY_SEPARATE_TESTS="$run_test" -G "$($env:GENERATOR)" -A ${{ parameters.target_arch }} .. | Tee-Object -FilePath cmake_gen_log.txt
      cmake --build . --config $($env:BUILD_TYPE) | Tee-Object -FilePath build_log.txt
  displayName: Windows Build

# Copy the executable from a build type specific directory to the upper build directory on Windows
- task: CopyFiles@2
  inputs:
    contents: '$(Build.SourcesDirectory)/build/$(build_type)/$(application_executable_name)'
    targetFolder: '$(Build.SourcesDirectory)/build'
    flattenFolders: true
  displayName: Copy Uncrustify Executable on Windows Builds
  condition: and(succeeded(), or(ne(variables['build_type'], 'xcross'), ne('${{ parameters.skip_test }}', 'True')))
